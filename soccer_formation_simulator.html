<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サッカーフォーメーションシミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #e8f5ff 0%, #f0fff4 50%, #fff8e8 100%);
    color: #1f2d3d;
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    padding: 20px;
    font-size: 1.6rem;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(90deg, #00b894, #0984e3, #6c5ce7);
    box-shadow: 0 4px 16px rgba(9,132,227,0.25);
  }
  .subtitle {
    text-align: center;
    color: #5a6a7a;
    font-size: 0.85rem;
    padding: 10px 16px 0;
  }
  .main {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    padding: 18px;
    justify-content: center;
    align-items: flex-start;
  }
  .panel {
    background: #ffffff;
    border-radius: 16px;
    padding: 18px;
    min-width: 250px;
    max-width: 290px;
    box-shadow: 0 6px 20px rgba(31,45,61,0.08);
    border: 1px solid rgba(31,45,61,0.05);
  }
  .panel h2 {
    font-size: 1.05rem;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-a h2 { color: #e74c3c; }
  .panel-b h2 { color: #2980d9; }

  select, input[type=text] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid #dfe6ec;
    background: #f7fafc;
    color: #1f2d3d;
    font-size: 0.9rem;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:focus, input:focus {
    border-color: #0984e3;
    box-shadow: 0 0 0 3px rgba(9,132,227,0.12);
  }
  option { background: #fff; color: #1f2d3d; }
  optgroup { color: #888; }

  label {
    font-size: 0.8rem;
    color: #5a6a7a;
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
  }
  label .v { color: #0984e3; font-weight: 700; }
  .panel-a label .v { color: #e74c3c; }

  .team-color {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  input[type=color] {
    width: 40px; height: 40px;
    border: none; border-radius: 10px;
    cursor: pointer; background: none;
    padding: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  input[type=range] {
    width: 100%;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .panel-a input[type=range] { accent-color: #e74c3c; }
  .panel-b input[type=range] { accent-color: #2980d9; }

  .preset-box {
    background: linear-gradient(135deg, #fff9e6, #fff);
    border: 1.5px solid #ffe08a;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
  }
  .preset-box label { color: #b8860b; margin-bottom: 6px; }
  .preset-box select { margin-bottom: 0; background:#fff; border-color:#ffe08a; }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
    color: #fff;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(90deg, #00b894, #0984e3);
    box-shadow: 0 6px 18px rgba(9,132,227,0.3);
  }
  .btn-primary:hover { box-shadow: 0 8px 24px rgba(9,132,227,0.45); }
  .btn-secondary {
    background: #fff;
    color: #5a6a7a;
    border: 1.5px solid #dfe6ec;
    box-shadow: none;
    margin-top: 10px;
  }
  .btn-secondary:hover { background: #f0f4f8; }

  /* Pitch */
  .pitch-wrap {
    position: relative;
    width: 360px;
    flex-shrink: 0;
  }
  canvas#pitch {
    border-radius: 14px;
    display: block;
    box-shadow: 0 8px 28px rgba(0,80,40,0.25);
    width: 100%;
  }
  .pitch-vs {
    text-align: center;
    margin-top: 10px;
    font-size: 0.85rem;
    color: #5a6a7a;
    font-weight: 600;
  }

  .formation-info {
    font-size: 0.78rem;
    color: #7a8a9a;
    margin-top: 4px;
    line-height: 1.5;
    background: #f7fafc;
    border-radius: 8px;
    padding: 8px 10px;
  }

  /* Scoreboard */
  #scoreboard {
    text-align: center;
    padding: 18px;
    background: #fff;
    border-radius: 16px;
    width: 100%;
    max-width: 740px;
    margin: 0 auto 12px;
    box-shadow: 0 6px 20px rgba(31,45,61,0.08);
  }
  .score-teams {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 22px;
    font-size: 1.15rem;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .score-num { font-size: 2.8rem; font-weight: 800; }
  .score-sep { font-size: 1.8rem; color: #b0bcc8; }
  .score-minute { font-size: 0.85rem; color: #7a8a9a; }
  .winner-banner {
    text-align: center;
    font-size: 1.15rem;
    font-weight: 800;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
  }

  /* Stats */
  #stats-box, #log-box {
    width: 100%;
    max-width: 740px;
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    margin: 0 auto 16px;
    box-shadow: 0 6px 20px rgba(31,45,61,0.08);
  }
  #stats-box h2, #log-box h2 {
    font-size: 1.05rem;
    color: #0984e3;
    margin-bottom: 14px;
  }
  .cmp-stat { margin-bottom: 12px; }
  .cmp-top {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .cmp-label { color: #7a8a9a; font-weight: 600; }
  .cmp-bars { display: flex; height: 12px; gap: 3px; }
  .cmp-a { border-radius: 6px 2px 2px 6px; transition: width 0.6s; }
  .cmp-b { border-radius: 2px 6px 6px 2px; transition: width 0.6s; }

  .analysis {
    margin-top: 14px;
    font-size: 0.82rem;
    color: #5a6a7a;
    border-top: 1px solid #eef2f5;
    padding-top: 12px;
    line-height: 1.7;
  }
  .analysis .ttl { color: #0984e3; font-weight: 700; margin-bottom: 4px; }

  /* Log */
  #log-list {
    max-height: 280px;
    overflow-y: auto;
    font-size: 0.84rem;
    line-height: 1.8;
    padding-right: 6px;
  }
  #log-list::-webkit-scrollbar { width: 6px; }
  #log-list::-webkit-scrollbar-thumb { background: #cdd8e2; border-radius: 4px; }
  .log-goal { color: #e67e22; font-weight: 800; }
  .log-event { color: #8a98a6; }
  .log-half { color: #0984e3; font-weight: 700; padding: 4px 0; }

  #sim-progress {
    display: none;
    text-align: center;
    padding: 14px;
    font-size: 0.95rem;
    color: #0984e3;
    font-weight: 600;
  }

  .controls-wrap { text-align: center; padding: 0 16px 20px; }
  .controls-inner { max-width: 420px; margin: auto; }
</style>
</head>
<body>
<h1>⚽ サッカーフォーメーション仮想実験室</h1>
<div class="subtitle">現代戦術を参考にしたプリセット、または自作フォーメーションを対戦させて研究しよう</div>

      <input type="range" id="def-a" min="1" max="100" value="50">

      <input type="range" id="press-a" min="1" max="100" value="50">
    </div>
  </div>

  <!-- Pitch -->

  </div>

  <!-- Team B -->

    <h2>🔵 チームB</h2>

      <input type="color" id="color-b" value="#2980d9">
      <span style="font-size:0.82rem;color:#7a8a9a">ユニフォーム色</span>
    </div>

    <div class="preset-box">
      <label>⚡ 戦術プリセット（現代モデル）</label>
      <select id="preset-b"></select>
    </div>

    <div style="margin-top:14px">

      <input type="range" id="atk-b" min="1" max="100" value="50">
      <label>守備力 <span class="v" id="def-b-val">50</span></label>
      <input type="range" id="def-b" min="1" max="100" value="50">
      <label>プレス強度 <span class="v" id="press-b-val">50</span></label>
      <input type="range" id="press-b" min="1" max="100" value="50">
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls-wrap">
  <div class="controls-inner">
    <button class="btn btn-primary" id="btn-sim">▶ 試合シミュレーション開始</button>
    <button class="btn btn-secondary" id="btn-reset">リセット</button>
  </div>
</div>

<div id="sim-progress">⚽ シミュレーション中...</div>

<!-- Scoreboard -->
<div id="scoreboard" style="display:none">
  <div class="score-teams">
    <span id="sb-name-a">チームA</span>
    <span class="score-num" id="sb-score-a">0</span>

  <div class="winner-banner" id="winner-banner"></div>
</div>

<!-- Stats -->
<div id="stats-box" style="display:none">
  <h2>📊 試合統計</h2>

</div>

<!-- Log -->
<div id="log-box" style="display:none">
  <h2>📋 試合ログ</h2>
  <div id="log-list"></div>
</div>

  "ハイプレス3シャドー (ナポリ/コンテ系)": {
    form: "3-4-2-1", atk: 74, def: 64, press: 78,
    note: "2シャドーとWBで前向きの圧力。奪ってから素早く相手ゴールへ。"
  },
  "トータルフットボール (アヤックス系)": {
    form: "4-3-3", atk: 85, def: 48, press: 80,
    note: "全選手が流動的にポジションを入れ替える攻撃的哲学。高いライン設定。"
  },
  "カテナチオ / 超守備 (伊クラシック)": {
    form: "5-3-2", atk: 38, def: 92, press: 32,
    note: "リベロを置いた鉄壁の守備。1点を守り切る伝統的イタリア式。"
  },
  "ロングボール / フィジカル (英クラシック)": {
    form: "4-4-2", atk: 64, def: 60, press: 55,
    note: "縦に速いダイレクトサッカー。サイドからのクロスと2トップの高さ勝負。"
  },
};

// ===== DOM =====
const formSelA = document.getElementById('form-a');
const formSelB = document.getElementById('form-b');
const presetSelA = document.getElementById('preset-a');
const presetSelB = document.getElementById('preset-b');
const pitchCanvas = document.getElementById('pitch');
const ctx = pitchCanvas.getContext('2d');

// Populate formation selects
Object.keys(FORMATIONS).forEach(k => {
  [formSelA, formSelB].forEach(sel => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k;
    sel.appendChild(opt);
  });
});
formSelA.value = '4-3-3';
formSelB.value = '4-4-2';

// Populate preset selects
Object.keys(PRESETS).forEach(k => {
  [presetSelA, presetSelB].forEach(sel => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k;
    sel.appendChild(opt);
  });
});

// ===== Helpers =====
function setSlider(team, key, val) {
  const el = document.getElementById(`${key}-${team}`);
  el.value = val;
  document.getElementById(`${key}-${team}-val`).textContent = val;
}

function applyPreset(team) {
  const presetSel = document.getElementById(`preset-${team}`);
  const p = PRESETS[presetSel.value];
  if (!p) { drawPitch(); return; }
  document.getElementById(`form-${team}`).value = p.form;
  setSlider(team, 'atk', p.atk);
  setSlider(team, 'def', p.def);
  setSlider(team, 'press', p.press);
  updateInfo(team);
  drawPitch();
}

function updateInfo(team) {
  const sel = document.getElementById(`form-${team}`);
  const info = document.getElementById(`info-${team}`);
  const presetSel = document.getElementById(`preset-${team}`);
  const f = FORMATIONS[sel.value];
  let txt = f ? f.desc : '';
  const p = PRESETS[presetSel.value];
  if (p) txt = '💡 ' + p.note;
  info.textContent = txt;
}

// ===== Events =====
['a','b'].forEach(t => {
  ['atk','def','press'].forEach(s => {
    const el = document.getElementById(`${s}-${t}`);
    const lbl = document.getElementById(`${s}-${t}-val`);
    el.addEventListener('input', () => {
      lbl.textContent = el.value;
      // 手動で動かしたらプリセットを解除
      document.getElementById(`preset-${t}`).value = '— 手動設定 —';
      updateInfo(t);
      drawPitch();
    });
  });
  document.getElementById(`form-${t}`).addEventListener('change', () => {
    document.getElementById(`preset-${t}`).value = '— 手動設定 —';
    updateInfo(t);
    drawPitch();
  });
  document.getElementById(`preset-${t}`).addEventListener('change', () => applyPreset(t));
  document.getElementById(`color-${t}`).addEventListener('change', drawPitch);
  document.getElementById(`name-${t}`).addEventListener('input', drawPitch);
});
updateInfo('a'); updateInfo('b');

// ===== PITCH DRAWING =====
function drawPitch() {
  const W = pitchCanvas.width, H = pitchCanvas.height;
  ctx.clearRect(0, 0, W, H);

  // Grass
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#2ec27e');
  grad.addColorStop(0.5, '#27ae60');
  grad.addColorStop(1, '#2ec27e');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, W, H, 14);
  ctx.fill();

  // Mowing stripes
  ctx.globalAlpha = 0.08;
  for (let y = 0; y < H; y += 44) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, y, W, 22);
  }
  ctx.globalAlpha = 1;

  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;

  // Border
  ctx.strokeRect(16, 14, W-32, H-28);
  // Center line
  ctx.beginPath();
  ctx.moveTo(16, H/2);
  ctx.lineTo(W-16, H/2);
  ctx.stroke();
  // Center circle
  ctx.beginPath();
  ctx.arc(W/2, H/2, 48, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W/2, H/2, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();

  // Penalty + goal areas
  const paW = 190, paH = 74, gaW = 96, gaH = 28;
  ctx.strokeRect((W-paW)/2, 14, paW, paH);
  ctx.strokeRect((W-gaW)/2, 14, gaW, gaH);
  ctx.strokeRect((W-paW)/2, H-14-paH, paW, paH);
  ctx.strokeRect((W-gaW)/2, H-14-gaH, gaW, gaH);

  // Penalty spots
  [[W/2, 14+54],[W/2, H-14-54]].forEach(([px,py]) => {
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();
  });

  // Teams
  const fA = FORMATIONS[formSelA.value];
  const fB = FORMATIONS[formSelB.value];
  const colA = document.getElementById('color-a').value;
  const colB = document.getElementById('color-b').value;

  if (fA) drawTeam(fA.positions, colA, false, W, H);
  if (fB) drawTeam(fB.positions, colB, true, W, H);

  // Labels
  ctx.font = 'bold 12px Segoe UI';
  ctx.fillStyle = colA;
  ctx.textAlign = 'left';
  ctx.fillText('▲ ' + (document.getElementById('name-a').value || 'チームA'), 20, H-6);
  ctx.fillStyle = colB;
  ctx.textAlign = 'right';
  ctx.fillText((document.getElementById('name-b').value || 'チームB') + ' ▼', W-20, 24);

  // VS info under pitch
  document.getElementById('pitch-vs').textContent =
    `${formSelA.value}  ⚔  ${formSelB.value}`;
}

function drawTeam(positions, color, flip, W, H) {
  const pad = 16;
  positions.forEach((pos, i) => {
    let x = pos.x * (W - pad*2) + pad;
    let y = pos.y * (H - 28*2) + 28;
    if (flip) { y = H - y; }

    ctx.beginPath();
    ctx.arc(x+2, y+2, 12, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, x, y);
  });
  ctx.textBaseline = 'alphabetic';
}

// ===== SIMULATION ENGINE =====
function getFormStats(team) {
  const sel = document.getElementById(`form-${team}`);
  const f = FORMATIONS[sel.value];
  const atkSlider = parseInt(document.getElementById(`atk-${team}`).value);
  const defSlider = parseInt(document.getElementById(`def-${team}`).value);
  const pressSlider = parseInt(document.getElementById(`press-${team}`).value);
  return {
    name: sel.value,
    atk: (f.atk * 0.45 + atkSlider * 0.55) / 100,
    def: (f.def * 0.45 + defSlider * 0.55) / 100,
    mid: f.mid / 100,
    width: f.width / 100,
    press: (f.press * 0.45 + pressSlider * 0.55) / 100,
  };
}

function rnd(min, max) { return Math.random() * (max - min) + min; }
function chance(p) { return Math.random() < p; }

function simulate() {
  const stA = getFormStats('a');
  const stB = getFormStats('b');
  const nameA = document.getElementById('name-a').value || 'チームA';
  const nameB = document.getElementById('name-b').value || 'チームB';

  const log = [];
  let scoreA = 0, scoreB = 0;

  const stats = {
    shots_a: 0, shots_b: 0, shots_on_a: 0, shots_on_b: 0,
    corners_a: 0, corners_b: 0, fouls_a: 0, fouls_b: 0,
    offsides_a: 0, offsides_b: 0, possession_a: 0, possession_b: 0,
  };

  // 中盤の支配力でポゼッションを決定
  const facA = stA.mid * 0.6 + stA.width * 0.2 + (1 - stB.press) * 0.2;
  const facB = stB.mid * 0.6 + stB.width * 0.2 + (1 - stA.press) * 0.2;
  const basePossA = facA / (facA + facB + 0.001);

  log.push({type:'half', text: '━━━ 前半キックオフ ━━━'});

  for (let min = 1; min <= 90; min++) {
    if (min === 46) log.push({type:'half', text: '━━━ 後半キックオフ ━━━'});

    const possA = Math.min(0.85, Math.max(0.15, basePossA + rnd(-0.08, 0.08)));
    if (chance(possA)) stats.possession_a++; else stats.possession_b++;

    const shotChanceA = stA.atk * 0.05 * (1 - stB.def * 0.5) * (possA > 0.5 ? 1.3 : 0.8);
    const shotChanceB = stB.atk * 0.05 * (1 - stA.def * 0.5) * (possA < 0.5 ? 1.3 : 0.8);
    // カウンター: 失った側がプレスで奪い返して速攻
    const counterA = stA.atk * 0.018 * (1 - possA) * stA.press;
    const counterB = stB.atk * 0.018 * possA * stB.press;

    let scored = false;
    if (chance(shotChanceA + counterA)) {
      stats.shots_a++;
      if (chance(0.42 + stA.atk * 0.22)) {
        stats.shots_on_a++;
        if (chance(0.26 + stA.atk * 0.15 - stB.def * 0.12)) {
          scoreA++; scored = true;
          const t = ['右足シュート','左足シュート','ヘディング','直接FK','PK','ミドルシュート'][Math.floor(Math.random()*6)];
          log.push({type:'goal', text: `⚽ ${min}' GOAL！ ${nameA} (${t}) [${scoreA}-${scoreB}]`});
        } else if (chance(0.5)) {
          log.push({type:'event', text: `${min}' ${nameA} のシュートをGKがビッグセーブ`});
        }
      } else if (chance(0.3)) {
        stats.corners_a++;
        log.push({type:'event', text: `${min}' ${nameA} コーナーキック`});
      }
    }
    if (!scored && chance(shotChanceB + counterB)) {
      stats.shots_b++;
      if (chance(0.42 + stB.atk * 0.22)) {
        stats.shots_on_b++;
        if (chance(0.26 + stB.atk * 0.15 - stA.def * 0.12)) {
          scoreB++;
          const t = ['右足シュート','左足シュート','ヘディング','直接FK','PK','ミドルシュート'][Math.floor(Math.random()*6)];
          log.push({type:'goal', text: `⚽ ${min}' GOAL！ ${nameB} (${t}) [${scoreA}-${scoreB}]`});
        } else if (chance(0.5)) {
          log.push({type:'event', text: `${min}' ${nameB} のシュートをGKがビッグセーブ`});
        }
      } else if (chance(0.3)) {
        stats.corners_b++;
        log.push({type:'event', text: `${min}' ${nameB} コーナーキック`});
      }
    }

    if (chance(0.08)) {
      const isA = chance(0.5);
      const ev = isA ? nameA : nameB;
      const opp = isA ? nameB : nameA;
      if (chance(0.4)) {
        if (isA) stats.fouls_a++; else stats.fouls_b++;
        log.push({type:'event', text: `${min}' ${ev} がファウル → ${opp} にFK`});
      } else if (chance(0.3)) {
        if (isA) stats.offsides_a++; else stats.offsides_b++;
        log.push({type:'event', text: `${min}' ${ev} オフサイド`});
      }
    }

    if ((min === 60 || min === 70 || min === 78) && chance(0.4)) {
      const isA = chance(0.5);
      log.push({type:'event', text: `${min}' ${isA ? nameA : nameB} 選手交代`});
    }
  }

  log.push({type:'half', text: `━━━ 試合終了 ${scoreA}-${scoreB} ━━━`});

  const totalMin = stats.possession_a + stats.possession_b;
  const possPctA = Math.round(stats.possession_a / totalMin * 100);
  return { scoreA, scoreB, log, stats, possPctA, possPctB: 100 - possPctA, nameA, nameB };
}

// ===== UI control =====
document.getElementById('btn-sim').addEventListener('click', () => {
  document.getElementById('sim-progress').style.display = 'block';
  ['scoreboard','stats-box','log-box'].forEach(id => document.getElementById(id).style.display = 'none');
  setTimeout(() => {
    showResult(simulate());
    document.getElementById('sim-progress').style.display = 'none';
  }, 450);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  ['scoreboard','stats-box','log-box','sim-progress'].forEach(id => document.getElementById(id).style.display = 'none');
  ['a','b'].forEach(t => {
    ['atk','def','press'].forEach(s => setSlider(t, s, 50));
    document.getElementById(`preset-${t}`).value = '— 手動設定 —';
    updateInfo(t);
  });
  drawPitch();
});

function showResult(r) {
  const colA = document.getElementById('color-a').value;
  const colB = document.getElementById('color-b').value;

  document.getElementById('sb-name-a').textContent = r.nameA;
  document.getElementById('sb-name-b').textContent = r.nameB;
  document.getElementById('sb-score-a').textContent = r.scoreA;
  document.getElementById('sb-score-b').textContent = r.scoreB;
  document.getElementById('sb-minute').textContent = '90分 試合終了';
  document.getElementById('sb-score-a').style.color = colA;
  document.getElementById('sb-score-b').style.color = colB;

  const banner = document.getElementById('winner-banner');
  if (r.scoreA > r.scoreB) {
    banner.textContent = `🏆 ${r.nameA} の勝利！`;
    banner.style.background = colA + '22'; banner.style.color = colA;
  } else if (r.scoreB > r.scoreA) {
    banner.textContent = `🏆 ${r.nameB} の勝利！`;
    banner.style.background = colB + '22'; banner.style.color = colB;
  } else {
    banner.textContent = '🤝 引き分け';
    banner.style.background = '#f0f4f8'; banner.style.color = '#5a6a7a';
  }
  document.getElementById('scoreboard').style.display = 'block';

  const statsData = [
    { label: 'ポゼッション', a: r.possPctA, b: r.possPctB, suffix: '%' },
    { label: 'シュート', a: r.stats.shots_a, b: r.stats.shots_b },
    { label: '枠内シュート', a: r.stats.shots_on_a, b: r.stats.shots_on_b },
    { label: 'コーナー', a: r.stats.corners_a, b: r.stats.corners_b },
    { label: 'ファウル', a: r.stats.fouls_a, b: r.stats.fouls_b },
    { label: 'オフサイド', a: r.stats.offsides_a, b: r.stats.offsides_b },
  ];
  let html = '';
  statsData.forEach(s => {
    const total = s.a + s.b || 1;
    const wA = (s.a / total * 100).toFixed(0);
    const wB = 100 - wA;
    html += `
    <div class="cmp-stat">
      <div class="cmp-top">
        <span style="color:${colA}">${s.a}${s.suffix||''}</span>
        <span class="cmp-label">${s.label}</span>
        <span style="color:${colB}">${s.b}${s.suffix||''}</span>
      </div>
      <div class="cmp-bars">
        <div class="cmp-a" style="width:${wA}%;background:${colA}"></div>
        <div class="cmp-b" style="width:${wB}%;background:${colB}"></div>
      </div>
    </div>`;
  });

  const stA = getFormStats('a');
  const stB = getFormStats('b');
  const adv = [];
  if (stA.mid > stB.mid + 0.1) adv.push(`${r.nameA}が中盤を支配`);
  if (stB.mid > stA.mid + 0.1) adv.push(`${r.nameB}が中盤を支配`);
  if (stA.atk > stB.def + 0.15) adv.push(`${r.nameA}の攻撃が${r.nameB}守備を上回る`);
  if (stB.atk > stA.def + 0.15) adv.push(`${r.nameB}の攻撃が${r.nameA}守備を上回る`);
  if (stA.press > stB.press + 0.12) adv.push(`${r.nameA}の高プレスが効果的`);
  if (stB.press > stA.press + 0.12) adv.push(`${r.nameB}の高プレスが効果的`);

  html += `<div class="analysis">
    <div class="ttl">🔍 フォーメーション分析</div>
    <div>${formSelA.value} vs ${formSelB.value}</div>
    ${adv.map(a => `<div>・${a}</div>`).join('')}
    ${adv.length === 0 ? '<div>・両フォーメーションは拮抗している</div>' : ''}
  </div>`;

  document.getElementById('stats-content').innerHTML = html;
  document.getElementById('stats-box').style.display = 'block';

  const logList = document.getElementById('log-list');
  logList.innerHTML = r.log.map(e => {
    const cls = e.type === 'goal' ? 'log-goal' : e.type === 'half' ? 'log-half' : 'log-event';
    return `<div class="${cls}">${e.text}</div>`;
  }).join('');
  document.getElementById('log-box').style.display = 'block';

  document.getElementById('scoreboard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Initial draw
drawPitch();
</script>
